version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=workflow
      - DB_PASSWORD=workflow123
      - DB_NAME=workflow
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis123
      - JWT_SECRET=workflow-jwt-secret-change-in-production
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=workflow
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    networks:
      - workflow-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - workflow-network

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=workflow
      - POSTGRES_USER=workflow
      - POSTGRES_PASSWORD=workflow123
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - workflow-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - workflow-network

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - workflow-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - workflow-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  workflow-network:
    driver: bridge
